services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: banking-crm-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=sqlite:////app/data/banking_crm.db
    volumes:
      - backend-data:/app/data
    restart: always

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: banking-crm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
